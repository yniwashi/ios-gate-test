<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#d63838">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>CPR Timer - Android Parity Sandbox</title>
<style>
:root{
  color-scheme:light;
  --bg:#f4f7fb;--surface:#fff;--surface-alt:#eff4fa;--text:#101827;--muted:#657386;--border:#d9e0ea;
  --red:#d63838;--red-soft:#fff1f1;--red-border:#ffc7c7;--cycle:#ef4444;--adr:#2563eb;
  --shock:#eab308;--amio:#a855f7;--dsed:#fb9e24;--rosc:#22c55e;--stop:#dc2626;--wa:#d936be;
  --disabled:#f1f5f9;--disabled-text:#94a3b8;--shadow:0 2px 10px rgba(16,24,39,.12);--shadow-strong:0 8px 24px rgba(16,24,39,.16);
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}
*{box-sizing:border-box}html{margin:0;min-height:100%;background:var(--red)}body{margin:0;min-height:100%;background:var(--bg);color:var(--text)}body:before{content:"";position:fixed;z-index:120;top:0;left:0;right:0;height:env(safe-area-inset-top);background:var(--red);pointer-events:none}button,input,select{font:inherit}
body{overscroll-behavior:none}.app{min-height:100dvh;padding:calc(env(safe-area-inset-top) + 8px) 8px calc(env(safe-area-inset-bottom) + 10px)}
.stack{display:flex;flex-direction:column;gap:7px;max-width:980px;margin:0 auto}.card{background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow);border-radius:18px}
.header{padding:7px 8px;display:flex;flex-direction:column;gap:8px}.topline{display:grid;grid-template-columns:64px 1fr 64px;align-items:center;gap:8px}
.title{text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px}.title b{font-size:23px;color:var(--red);font-weight:900;line-height:1}.trial{font-size:8.5px;font-weight:900;background:var(--red-soft);border:1px solid var(--red-border);border-radius:999px;padding:2px 8px;color:#101828}
.headrow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.hbtn,.iconbtn,.info{height:38px;border:1px solid var(--red-border);background:var(--red-soft);color:var(--red);border-radius:14px;font-size:12px;font-weight:900;display:inline-flex;align-items:center;justify-content:center;padding:0 7px;text-decoration:none;min-width:0}
.iconbtn{height:38px;width:100%;font-size:0}.info{height:38px;color:#000}.ghost{border:0;background:transparent}.svg-ico{width:20px;height:20px;fill:currentColor;flex:0 0 auto}.action .svg-ico{width:23px;height:23px}.tbtn .svg-ico{width:22px;height:22px}.action.long .svg-ico{width:19px;height:19px}
.banner{display:none;padding:11px 12px;border:1px solid rgba(214,56,56,.35);background:#fff7f7;border-radius:20px;box-shadow:var(--shadow);gap:10px}.banner.show{display:flex;flex-direction:column}.banner-row{display:flex;align-items:center;gap:8px}.banner-title,.badge{font-size:11px;font-weight:900;letter-spacing:1.1px;border-radius:999px;padding:4px 10px;border:1px solid currentColor;background:color-mix(in srgb,currentColor 12%,transparent)}
.banner-title{color:var(--red)}.banner-q{font-size:16px;font-weight:900}.banner-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.promptbtn{height:42px;border-radius:14px;border:1px solid var(--red-border);font-weight:900}.promptbtn.primary{background:var(--adr);color:#fff;border-color:#1d4ed8}.promptbtn.secondary{background:#fff;color:var(--red)}
#resumeBanner{position:sticky;top:calc(env(safe-area-inset-top) + 8px);z-index:35;padding:14px;border:2px solid var(--red);background:linear-gradient(180deg,#fff7f7,#ffe4e4);box-shadow:0 10px 28px rgba(214,56,56,.24),0 0 0 4px rgba(214,56,56,.08)}
#resumeBanner.show{animation:resumePulse 1.35s ease-in-out 3}
#resumeBanner .banner-row:before{content:"!";width:24px;height:24px;border-radius:999px;background:var(--red);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;line-height:1}
#resumeBanner .banner-title{background:var(--red);border-color:var(--red);color:#fff;font-size:12px;padding:5px 12px}
#resumeBanner #resumeGap{margin-left:auto;border-radius:999px;background:#fff;border:1px solid var(--red-border);color:var(--red)!important;padding:4px 9px;font-size:12px!important}
#resumeBanner .banner-q{font-size:17px;line-height:21px;color:#7f1d1d}
#resumeBanner .promptbtn{height:48px;border-radius:16px;font-size:15px}
#resumeBanner .promptbtn.primary{background:linear-gradient(180deg,#f87171,var(--red));border-color:#b91c1c}
@keyframes resumePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.012)}}
.feedback{display:none;align-items:center;gap:8px;background:#effdf5;border:1px solid rgba(34,197,94,.45);border-radius:18px;padding:9px 12px;box-shadow:var(--shadow);font-size:13px;font-weight:900}.feedback.show{display:flex}.feedback .tag{color:#15803d;background:rgba(255,255,255,.82);border:1px solid rgba(34,197,94,.22);border-radius:999px;padding:4px 9px;font-size:11px;letter-spacing:.8px}
.latest{display:none;gap:6px;overflow:auto;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:6px 8px}.latest.show{display:flex}.chip{white-space:nowrap;border-radius:999px;padding:4px 9px;font-size:10px;font-weight:900;border:1px solid color-mix(in srgb,var(--c) 22%,transparent);background:color-mix(in srgb,var(--c) 11%,transparent);color:var(--c)}.chip span{color:var(--text);margin-left:5px}
.total{text-align:center;padding:9px 12px;display:flex;flex-direction:column;align-items:center;gap:6px}.total .time{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:44px;font-weight:900;line-height:1}.badge.muted{color:var(--muted)}
.timer{position:relative;overflow:hidden;padding:10px 12px;border-radius:24px;border:1px solid color-mix(in srgb,var(--accent) 34%,transparent);box-shadow:var(--shadow);background:linear-gradient(180deg,color-mix(in srgb,var(--accent) 10%,#fff),color-mix(in srgb,var(--accent) 4.5%,#fff));display:flex;flex-direction:column;gap:2px}
.timer>*{position:relative;z-index:1}
.timer.active{box-shadow:0 0 0 1px color-mix(in srgb,var(--accent) 32%,transparent),0 8px 24px color-mix(in srgb,var(--accent) 16%,transparent)}
.timer.beat-pulse{animation:cycleCardPulse var(--beat-ms,500ms) linear infinite}
.timer.beat-pulse:before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,color-mix(in srgb,var(--accent) 30%,#fff),color-mix(in srgb,var(--accent) 14%,#fff));opacity:0;animation:cycleTintPulse var(--beat-ms,500ms) linear infinite;pointer-events:none}
@keyframes cycleTintPulse{0%{opacity:.82}45%{opacity:.30}100%{opacity:0}}
@keyframes cycleCardPulse{0%{border-color:color-mix(in srgb,var(--accent) 76%,transparent);box-shadow:0 0 0 1px color-mix(in srgb,var(--accent) 48%,transparent),0 8px 24px color-mix(in srgb,var(--accent) 22%,transparent)}100%{border-color:color-mix(in srgb,var(--accent) 42%,transparent);box-shadow:0 0 0 1px color-mix(in srgb,var(--accent) 30%,transparent),0 6px 18px color-mix(in srgb,var(--accent) 12%,transparent)}}
.timer-head{display:flex;align-items:center;gap:7px}.last{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);font-size:9.5px;font-weight:900;border-radius:999px;padding:3px 8px;background:color-mix(in srgb,var(--accent) 8%,transparent);border:1px solid color-mix(in srgb,var(--accent) 18%,transparent)}.last:empty{display:none}
.digits{height:122px;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--accent);font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:88px;font-weight:900;line-height:1;white-space:pre-line}.digits.prompt{font-size:40px}.digits.count{font-size:86px}
.timer-controls{display:grid;grid-template-columns:1fr 1fr;gap:36px;width:88%;margin:0 auto}.tbtn,.action{height:34px;border:0;border-radius:18px;font-size:12px;font-weight:900;color:#fff;box-shadow:0 6px 18px rgba(0,0,0,.16);transition:transform .08s ease;display:inline-flex;align-items:center;justify-content:center;gap:8px}.tbtn:active,.action:active{transform:scale(.94)}.tbtn[disabled],.action[disabled]{background:var(--disabled)!important;color:var(--disabled-text)!important;border:1px solid #cbd5e1!important;box-shadow:none;transform:none}
.tbtn.start{background:linear-gradient(180deg,#f87171,var(--red));border:1px solid #b91c1c}.tbtn.adrstart{background:linear-gradient(180deg,#60a5fa,var(--adr));border:1px solid #1d4ed8}.tbtn.pause{background:linear-gradient(180deg,#e2e8f0,#cbd5e1);color:#475569;border:1px solid #94a3b8}
.actions{display:grid;gap:7px;grid-template-columns:1fr 1fr;grid-template-areas:"stop stop" "amio rosc" "shock dsed" "wa wa"}.action{height:42px;font-size:14px;display:flex;align-items:center;justify-content:center;gap:7px}.action.full{width:100%}.stop{grid-area:stop;background:linear-gradient(180deg,#e86565,var(--stop))}.rosc{grid-area:rosc;background:linear-gradient(180deg,#59db8a,var(--rosc));color:#064e3b}.shock{grid-area:shock;background:linear-gradient(180deg,#f4d657,var(--shock));color:#713f12}.amio{grid-area:amio;background:linear-gradient(180deg,#bd7bf8,var(--amio))}.dsed{grid-area:dsed;background:linear-gradient(180deg,#ffbd63,var(--dsed));color:#7c2d12}.wa{background:linear-gradient(180deg,#e96bd4,var(--wa))}.neutral{background:linear-gradient(180deg,#4b5d73,#2e3d50)}.wa-section{grid-area:wa;width:100%;min-width:0}.wa-section>.action{width:100%}.hidden{display:none!important}
.panel{padding:9px;border-radius:18px;background:var(--surface);border:1px solid rgba(46,58,70,.35);box-shadow:var(--shadow)}.wa-panel{display:none;margin-top:7px;width:100%}.wa-panel.show{display:block}.mini-select{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}.sel{height:32px;border-radius:11px;border:1px solid #d0d5dd;background:#f0f2f5;color:#7a828c;font-size:11px;font-weight:900}.sel.on{background:var(--wa);border:2px solid var(--wa);color:#fff}.wa-form{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:7px}.agebox{height:50px;border:1px solid #d0d5dd;border-radius:16px;background:#fff;padding:6px 12px;display:flex;align-items:center;gap:8px}.agebox input{border:0;outline:0;font-weight:900;font-size:15px;min-width:0;width:100%}.agebox small{color:var(--muted);font-weight:900}.wa-results{margin-top:7px;display:grid;grid-template-columns:1fr 1fr;gap:5px}.wa-title{grid-column:1/-1;text-align:center;font-size:12px;font-weight:900}.wcell{min-height:48px;border-radius:10px;background:var(--surface-alt);padding:6px 7px}.wcell small{display:block;color:var(--muted);font-size:9px;font-weight:800}.wcell b{font-size:10.5px;line-height:1.2;white-space:pre-line}
.logcard{padding:10px;overflow:hidden}.loghead{display:flex;align-items:center;justify-content:flex-start;padding:0 0 4px;font-weight:900}.recent-toggle{border:1px solid color-mix(in srgb,currentColor 24%,transparent);background:color-mix(in srgb,currentColor 12%,transparent);color:var(--muted);border-radius:999px;padding:4px 10px;font-size:11px;font-weight:900;letter-spacing:1.1px;display:inline-flex;align-items:center;justify-content:center;gap:7px}.wa-toggle{border:1px solid var(--wa);background:linear-gradient(180deg,#e96bd4,var(--wa));color:#fff;border-radius:18px;height:42px;width:100%;padding:0 12px;font-size:14px;font-weight:900;display:flex;align-items:center;justify-content:center;position:relative;box-shadow:0 6px 18px rgba(0,0,0,.16);letter-spacing:0}.wa-toggle .chev{position:absolute;right:12px}.chev{width:20px;height:20px;border-radius:999px;border:1px solid color-mix(in srgb,currentColor 30%,transparent);display:inline-flex;align-items:center;justify-content:center}.chev svg{width:10px;height:7px;fill:none;stroke:currentColor;stroke-width:2.1;stroke-linecap:round;transition:transform .16s}.recent-collapsed .chev svg,.wa-section:not(.wa-open) .wa-toggle .chev svg{transform:rotate(180deg)}.recent{max-height:180px;overflow:auto;display:flex;flex-direction:column;gap:4px;padding-top:4px}.recent-collapsed .recent{display:none}.event{display:flex;align-items:center;gap:8px;background:var(--surface-alt);border-radius:12px;padding:6px 8px}.event time{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:11px;color:var(--muted);font-weight:900;white-space:nowrap}.event b{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.event small{display:none}
.subpage-host{position:fixed;inset:0;z-index:100;background:var(--bg);display:none}.subpage-host.show{display:block}.subpage-host iframe{display:block;width:100%;height:100%;border:0;background:var(--bg)}
.cpr-intro-modal{position:fixed;inset:0;z-index:130;background:rgba(15,23,42,.48);padding:18px;display:flex;align-items:center;justify-content:center}.cpr-intro-modal[hidden],.cpr-intro-actions button[hidden]{display:none!important}.cpr-intro-dialog{width:min(100%,520px);max-height:calc(100dvh - 36px);overflow:auto;background:#fff;border-radius:24px;padding:20px;box-shadow:0 18px 50px rgba(15,23,42,.28);display:flex;flex-direction:column;gap:16px}.cpr-intro-count{align-self:flex-start;border-radius:999px;background:#f1f5f9;color:#667085;padding:4px 10px;font-size:13px;font-weight:800}.cpr-intro-heading{display:flex;align-items:center;gap:12px}.cpr-intro-heading h2{margin:0;color:#dc2626;font-size:22px;line-height:25px;font-weight:900}.cpr-intro-icon{width:58px;height:58px;flex:0 0 58px;border-radius:16px;background:#fff1f2;color:#dc2626;display:flex;align-items:center;justify-content:center}.cpr-intro-icon svg{width:32px;height:32px;fill:currentColor}.cpr-intro-message{min-height:112px;max-height:230px;overflow:auto;border:1px solid #fecaca;border-radius:18px;background:#fff1f2;padding:16px;color:#111827;font-size:16px;line-height:23px;font-weight:800;text-align:center;display:flex;align-items:center;justify-content:center}.cpr-intro-dots{text-align:center;color:#dc2626;font-size:18px;font-weight:800;white-space:nowrap;overflow:hidden}.cpr-intro-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.cpr-intro-actions.first-page{grid-template-columns:repeat(2,minmax(0,1fr))}.cpr-intro-actions.first-page .cpr-intro-skip{grid-column:1}.cpr-intro-actions.first-page .cpr-intro-next{grid-column:2}.cpr-intro-actions button{height:44px;width:100%;border:0;border-radius:14px;color:#fff;font-weight:900}.cpr-intro-skip{background:#94a3b8}.cpr-intro-back{background:#64748b}.cpr-intro-next{background:#dc2626}
@media (orientation:landscape) and (min-width:700px){
  .app{padding:calc(env(safe-area-inset-top) + 16px) calc(env(safe-area-inset-right) + 14px) calc(env(safe-area-inset-bottom) + 10px) calc(env(safe-area-inset-left) + 14px)}.stack{max-width:1180px;gap:8px}.header{display:grid;grid-template-columns:64px 76px minmax(180px,1fr) 86px 46px 46px;align-items:center;padding:5px 8px;gap:8px}.topline,.headrow{display:contents}#homeBtn{grid-column:1;grid-row:1}#bpmInfo{grid-column:2;grid-row:1}.title{grid-column:3;grid-row:1;flex-direction:row;justify-content:center;min-width:0}.title b{font-size:19px}.trial{font-size:9px;white-space:nowrap}#historyBtn{grid-column:4;grid-row:1}#muteBtn{grid-column:5;grid-row:1}#settingsBtn{grid-column:6;grid-row:1}.hbtn,.info{height:38px}.iconbtn{height:34px}
  .latest{display:none!important}.land-top{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:stretch}.total,.land-latest{height:62px;min-height:62px;padding:7px 12px;align-self:stretch}.total{display:flex;flex-direction:row;align-items:center;justify-content:flex-start;gap:14px;text-align:left}.total .time{font-size:36px}.land-latest{display:flex;align-items:center;gap:8px;overflow:auto}
  .timers{display:grid;grid-template-columns:1fr 1fr;gap:12px}.timer{min-height:242px;padding:12px 14px}.digits{height:122px;font-size:clamp(88px,10vw,108px)}.digits.prompt{font-size:clamp(40px,5vw,52px)}.digits.count{font-size:clamp(92px,10vw,112px)}.timer-controls{gap:56px;width:80%}.tbtn{height:42px;border-radius:18px;font-size:14px}.tbtn .svg-ico{width:22px;height:22px}
  .actions{display:grid;grid-template-columns:repeat(4,1fr);grid-template-areas:"stop shock rosc dsed" "amio amio wa wa";gap:8px 12px}.action{height:42px}.wa-section{display:flex;flex-direction:column;gap:8px;width:100%}.wa-toggle{height:42px}.land-bottom{display:flex;justify-content:center;align-items:flex-start}.land-bottom.wa-expanded{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:12px}.land-bottom.wa-expanded .logcard.center{width:100%;max-width:none}.land-bottom.wa-expanded #waLandscapeHost{min-width:0}.land-bottom.wa-expanded .wa-panel{margin-top:0}.logcard.center{width:75%;max-width:900px}
}
@media (orientation:portrait), (max-width:699px){.land-top{display:block}.land-latest{display:none}.timers{display:flex;flex-direction:column;gap:7px}}
</style>
</head>
<body>
<div class="app">
  <main class="stack">
    <header class="header card">
      <div class="topline">
        <button class="hbtn" id="homeBtn">Home</button>
        <div class="title"><b>CPR Timer</b><span class="trial">Trial Version</span></div>
        <button class="iconbtn" id="settingsBtn" title="Settings" aria-label="Settings"></button>
      </div>
      <div class="headrow">
        <div class="info" id="bpmInfo">BPM 120</div>
        <button class="hbtn" id="historyBtn">History</button>
        <button class="iconbtn" id="muteBtn" title="Mute" aria-label="Mute"></button>
      </div>
    </header>
    <section id="adrBanner" class="banner">
      <div class="banner-row"><span class="banner-title">ADRENALINE DUE</span><span id="adrAttempt" style="font-size:11px;font-weight:900;color:var(--muted)">First prompt</span><span style="flex:1"></span><b id="adrPromptSeconds" style="font-family:ui-monospace;color:var(--red)">15s</b></div>
      <div class="banner-q">Was adrenaline given?</div>
      <div class="banner-actions"><button class="promptbtn primary" data-action="ADRENALINE_CONFIRM_GIVEN">Given</button><button class="promptbtn secondary" data-action="ADRENALINE_CONFIRM_NOT_YET">Not Yet</button></div>
    </section>
    <section id="feedback" class="feedback"><span class="tag">ACTION</span><span id="feedbackText"></span></section>
    <section id="resumeBanner" class="banner">
      <div class="banner-row"><span class="banner-title">CPR INTERRUPTED</span><span id="resumeGap" style="font-size:11px;font-weight:900;color:var(--muted)"></span></div>
      <div class="banner-q" id="resumeText">Review timers before continuing CPR.</div>
      <div class="banner-actions"><button class="promptbtn primary" id="resumeAudioBtn">Continue</button><button class="promptbtn secondary" id="resumeDismissBtn">Dismiss</button></div>
    </section>
    <section id="latest" class="latest"></section>
    <section class="land-top">
      <div class="total card"><span class="badge muted">TOTAL CPR</span><div id="totalTime" class="time">00:00</div></div>
      <div class="land-latest card"><span class="badge muted">LATEST</span><div id="landLatest" style="display:flex;gap:6px;overflow:auto;flex:1"></div></div>
    </section>
    <section class="timers">
      <article id="cyclePanel" class="timer" style="--accent:var(--cycle)">
        <div class="timer-head"><span class="badge" style="color:var(--cycle)">CYCLE</span><span id="cycleLast" class="last"></span></div>
        <div id="cycleTime" class="digits">00:00</div>
        <div class="timer-controls"><button id="cycleStart" class="tbtn start">Start</button><button id="cyclePause" class="tbtn pause">Pause</button></div>
      </article>
      <article id="adrPanel" class="timer" style="--accent:var(--adr)">
        <div class="timer-head"><span class="badge" style="color:var(--adr)">ADRENALINE</span><span id="adrLast" class="last"></span></div>
        <div id="adrTime" class="digits">00:00</div>
        <div class="timer-controls"><button id="adrStart" class="tbtn adrstart">Start</button><button id="adrPause" class="tbtn pause">Pause</button></div>
      </article>
    </section>
    <section class="actions">
      <button class="action stop" data-action="STOP" data-icon="stop">Stop</button>
      <button class="action amio long" data-action="AMIODARONE" data-icon="amiodarone">Amiodarone</button>
      <button class="action rosc" data-action="ROSC" data-icon="rosc">ROSC</button>
      <button class="action shock" data-action="SHOCK" data-icon="shock">Shock</button>
      <button class="action dsed" data-action="DSED" data-icon="dsed">Log DSED</button>
      <div class="wa-section" id="waSection">
        <button class="wa-toggle" id="waToggle">WAAFELSS <span class="chev"><svg viewBox="0 0 10 7"><path d="M1 5.8 5 1.2 9 5.8"/></svg></span></button>
        <section id="waPanel" class="panel wa-panel">
          <div class="mini-select"><button class="sel on" data-wa-scope="AP">AP</button><button class="sel" data-wa-scope="CCP">CCP</button><button class="sel on" data-wa-age="Months">Months</button><button class="sel" data-wa-age="Years">Years</button></div>
          <div class="wa-form"><label class="agebox"><span><small>Age</small><input id="waAge" inputmode="numeric" placeholder="0"></span><small id="waSuffix">months</small></label><button class="action wa" id="waCalc">Calculate</button></div>
          <div id="waError" style="display:none;color:#dc2626;font-size:12px;font-weight:900;margin-top:7px"></div>
          <div id="waResults" class="wa-results"></div>
        </section>
      </div>
    </section>
    <section class="land-bottom" id="landBottom">
      <section class="logcard card center" id="recentCard">
        <div class="loghead"><button class="recent-toggle" id="toggleRecent">RECENT EVENTS <span class="chev"><svg viewBox="0 0 10 7"><path d="M1 5.8 5 1.2 9 5.8"/></svg></span></button></div>

function logAdrenaline(note='Given by confirmation',elapsed=state.cprElapsedSeconds,wall=Date.now()){state.adrenalineCount++;appendEvent('ADRENALINE_ADMINISTERED',`Adrenaline #${state.adrenalineCount}`,note,elapsed,wall);state.adrenalineElapsedSeconds=0;state.adrenalinePrompt=null;state.isAdrenalineActive=true;state.isAdrenalinePaused=false}
async function action(a){try{await unlockAudio();primeAudio()}catch(error){console.error('CPR audio unlock failed',error)}let msg=feedbackText(a);if(a==='START')startCycle();if(a==='PAUSE')pauseCycle();if(a==='ADRENALINE')adrenaline();if(a==='ADRENALINE_PAUSE')pauseAdr();if(a==='ADRENALINE_CONFIRM_GIVEN')confirmAdr();if(a==='ADRENALINE_CONFIRM_NOT_YET')notYetAdr();if(a==='AMIODARONE')mark('amiodaroneCount','AMIODARONE_ADMINISTERED','Amiodarone');if(a==='SHOCK')mark('shockCount','SHOCK_DELIVERED','Shock',true);if(a==='DSED')mark('dsedCount','DSED_DELIVERED','DSED');if(a==='ROSC')rosc();if(a==='STOP')stopSave();if(msg)showFeedback(msg);render()}
function startCycle(){if(!session)return newSession();if(state.activePrompt?.type==='RHYTHM_CHECK')return;if(state.isAwaitingSave){state.isAwaitingSave=false;state.isRunning=true;state.isCyclePaused=false;state.cycleElapsedSeconds=0;state.activePrompt=null;appendEvent('CPR_STARTED','CPR restarted after ROSC');flags={cycleWarning:false,cycleFinished:false,total20:false};playCue('cpr_start_cpr');wake();startTicker();startBeat();return}if(state.isCyclePaused){let long=state.cyclePausedSeconds>settings.pauseResetThresholdSeconds;appendEvent('CPR_RESUMED',long?`New CPR cycle started after ${fmt(state.cyclePausedSeconds)} pause`:`CPR Timer Resumed after ${fmt(state.cyclePausedSeconds)} pause`);state.cycleElapsedSeconds=long?0:state.cycleElapsedSeconds;state.isCyclePaused=false;state.cyclePausedSeconds=0;state.isRunning=true;if(long){flags.cycleWarning=false;flags.cycleFinished=false}playCue('cpr_start_cpr');startTicker();startBeat();return}if(!state.isRunning){state.isRunning=true;appendEvent('CPR_STARTED','CPR Timer Started');playCue('cpr_start_cpr');wake();startTicker();startBeat()}}
function pauseCycle(){if(!session||!state.isRunning||state.isCyclePaused||state.isAwaitingSave||state.activePrompt?.type==='RHYTHM_CHECK')return;state.isCyclePaused=true;state.cyclePausedSeconds=0;appendEvent('CPR_PAUSED','CPR Timer Paused');playCue('cpr_paused');stopBeat()}
function adrenaline(){if(!session)startCycle();if(!session||state.isAwaitingSave&&state.isRunning)return;if(state.isAwaitingSave&&!state.isRunning)startCycle();if(state.isAdrenalinePaused){let long=state.adrenalinePausedSeconds>settings.pauseResetThresholdSeconds;appendEvent('ADRENALINE_PAUSED',`Adrenaline timer paused for ${fmt(state.adrenalinePausedSeconds)}`);if(long){logAdrenaline('Confirmed by user');playCue('cpr_give_adrenaline')}else{appendEvent('ADRENALINE_STARTED','Adrenaline Timer Resumed');state.isAdrenalinePaused=false;state.adrenalinePausedSeconds=0}return}if(state.isAdrenalineActive)return;logAdrenaline('Given by confirmation');playCue(state.adrenalineCount===1?'cpr_first_adrenaline_started':'cpr_give_adrenaline')}
function pauseAdr(){if(!session||state.isAwaitingSave||!state.isAdrenalineActive||state.isAdrenalinePaused)return;state.isAdrenalinePaused=true;state.adrenalinePausedSeconds=0;state.adrenalinePrompt=null;appendEvent('ADRENALINE_PAUSED','Adrenaline Timer Paused')}
function confirmAdr(){if(state.adrenalinePrompt?.type!=='ADRENALINE_CONFIRM')return;logAdrenaline('Given by confirmation')}
function notYetAdr(){let p=state.adrenalinePrompt;if(p?.type!=='ADRENALINE_CONFIRM')return;let n=p.attempt<=1?2:3;state.adrenalinePrompt={...p,type:'ADRENALINE_CONFIRM_WAIT',secondsRemaining:settings.adrenalineConfirmationDelaySeconds,attempt:n,wasMarkedNotYet:n>=3}}
function mark(key,type,name,shock=false){if(!session||state.isAwaitingSave)return;state[key]++;appendEvent(type,`${name} #${state[key]} ${name==='Shock'?'Delivered':'Administered'}`);if(shock&&state[key]===3)playCue('cpr_amiodarone_first_dose_due');if(shock&&state[key]===5)playCue('cpr_amiodarone_second_dose_due')}
function rosc(){if(!session||state.isAwaitingSave)return;state.roscCount++;appendEvent('ROSC',state.roscCount===1?'ROSC Achieved':`ROSC Achieved #${state.roscCount}`);session.outcome='ROSC';playCue('cpr_rosc');state.isRunning=false;state.isCyclePaused=false;state.isAdrenalineActive=false;state.isAdrenalinePaused=false;state.isAwaitingSave=true;state.cyclePausedSeconds=0;state.adrenalinePausedSeconds=0;state.cycleElapsedSeconds=0;state.adrenalineElapsedSeconds=0;state.activePrompt=null;state.adrenalinePrompt=null;stopTicker();stopBeat();releaseWake();flags={cycleWarning:false,cycleFinished:false,total20:false};persist()}
function stopSave(){if(!session){localStorage.removeItem(activeKey);stopTicker();stopBeat();stopSpokenCues();releaseWake();state={sessionId:null,isRunning:false,isCyclePaused:false,isAdrenalineActive:false,isAdrenalinePaused:false,cyclePausedSeconds:0,adrenalinePausedSeconds:0,isAwaitingSave:false,cprElapsedSeconds:0,cycleElapsedSeconds:0,adrenalineElapsedSeconds:0,cycleCount:0,adrenalineCount:0,amiodaroneCount:0,shockCount:0,dsedCount:0,roscCount:0,isMetronomeMuted:false,activePrompt:null,adrenalinePrompt:null,recentEvents:[]};return}appendEvent('CPR_STOPPED','CPR Timer Stopped');session.endedAtMillis=Date.now();session.totalSeconds=state.cprElapsedSeconds;session.outcome=session.outcome||'Completed';persist();localStorage.removeItem(activeKey);playCue('cpr_time_log');stopTicker();stopBeat();releaseWake();state={sessionId:null,isRunning:false,isCyclePaused:false,isAdrenalineActive:false,isAdrenalinePaused:false,cyclePausedSeconds:0,adrenalinePausedSeconds:0,isAwaitingSave:false,cprElapsedSeconds:0,cycleElapsedSeconds:0,adrenalineElapsedSeconds:0,cycleCount:0,adrenalineCount:0,amiodaroneCount:0,shockCount:0,dsedCount:0,roscCount:0,isMetronomeMuted:false,activePrompt:null,adrenalinePrompt:null,recentEvents:[]};session=null;flags={cycleWarning:false,cycleFinished:false,total20:false}}
function feedbackText(a){let has=!!session;return{START:state.isAwaitingSave?'CPR restarted':state.isCyclePaused&&state.cyclePausedSeconds>settings.pauseResetThresholdSeconds?'New CPR cycle started':state.isCyclePaused?'CPR resumed':!state.isRunning?'CPR started':null,PAUSE:state.isRunning&&!state.isCyclePaused&&!state.isAwaitingSave?'CPR paused':null,ADRENALINE:state.isAwaitingSave&&!state.isRunning?'CPR restarted · adrenaline logged':state.isAdrenalinePaused?'Adrenaline resumed':state.isAdrenalineActive?'Adrenaline timer already running':'Adrenaline logged',ADRENALINE_PAUSE:has&&state.isAdrenalineActive&&!state.isAdrenalinePaused&&!state.isAwaitingSave?'Adrenaline paused':null,ADRENALINE_CONFIRM_GIVEN:'Adrenaline logged',ADRENALINE_CONFIRM_NOT_YET:'Marked not yet',SHOCK:has&&!state.isAwaitingSave?'Shock logged':null,AMIODARONE:has&&!state.isAwaitingSave?'Amiodarone logged':null,DSED:has&&!state.isAwaitingSave?'DSED logged':null,ROSC:has&&!state.isAwaitingSave?'ROSC logged':null,STOP:has?'CPR session saved':null}[a]}
function showFeedback(m){$('feedbackText').textContent=m;$('feedback').classList.add('show');clearTimeout(feedbackTimer);feedbackTimer=setTimeout(()=>$('feedback').classList.remove('show'),1600)}
function statusText(){if(state.activePrompt?.type==='RHYTHM_CHECK')return'Rhythm check in progress';if(['GIVE_ADRENALINE','ADRENALINE_GIVE_CONFIRM'].includes(state.adrenalinePrompt?.type))return'Adrenaline cue active';if(state.isAwaitingSave)return'ROSC recorded · ready to restart or stop';if(state.isCyclePaused)return'Cycle paused · total time continues';if(state.isAdrenalinePaused)return'Adrenaline timer paused';if(state.isRunning)return'Running · webclip active';if(state.sessionId)return'Autosaved · ready to continue';return'Ready'}
function canStartCycle(){return state.isAwaitingSave||!state.isRunning||state.isCyclePaused}function canStartAdr(){return(state.isAwaitingSave&&!state.isRunning)||!state.isAdrenalineActive||state.isAdrenalinePaused}
function startText(){return state.isAwaitingSave?'Restart CPR':state.isCyclePaused&&state.cyclePausedSeconds>settings.pauseResetThresholdSeconds?'New Cycle':state.isCyclePaused?'Resume':'Start'}function adrStartText(){return state.isAwaitingSave&&!state.isRunning?'Start CPR + Adr':state.isAdrenalinePaused&&state.adrenalinePausedSeconds>settings.pauseResetThresholdSeconds?'Give & Restart':state.isAdrenalinePaused?'Resume':'Start'}
function render(){settings.bpm=Math.max(60,Math.min(160,settings.bpm));$('bpmInfo').textContent=`BPM ${settings.bpm}`;$('settingsBtn').innerHTML=svgIcon('settings');$('muteBtn').innerHTML=svgIcon(state.isMetronomeMuted?'mute':'unmute');$('muteBtn').disabled=!session;$('muteBtn').style.opacity=session?'1':'.45';$('waSection').classList.toggle('hidden',!settings.useWaafles);if(!settings.useWaafles){$('waPanel').classList.remove('show');$('waSection').classList.remove('wa-open')}syncWaaflesPlacement();$('totalTime').textContent=fmt(state.cprElapsedSeconds);let cp=state.activePrompt?.type==='RHYTHM_CHECK';$('cycleTime').textContent=cp?String(state.activePrompt.secondsRemaining):fmt(state.cycleElapsedSeconds);$('cycleTime').className='digits '+(cp?'count':'');let ap=state.adrenalinePrompt&&['GIVE_ADRENALINE','ADRENALINE_GIVE_CONFIRM'].includes(state.adrenalinePrompt.type);$('adrTime').textContent=ap?'Give\nAdrenaline':fmt(state.adrenalineElapsedSeconds);$('adrTime').className='digits '+(ap?'prompt':'');let cyclePulse=state.isRunning&&!state.isCyclePaused&&!state.isAwaitingSave;$('cyclePanel').classList.toggle('active',cyclePulse);$('cyclePanel').classList.toggle('beat-pulse',cyclePulse);$('cyclePanel').style.setProperty('--beat-ms',Math.max(300,Math.min(1000,Math.floor(60000/settings.bpm)))+'ms');$('adrPanel').classList.toggle('active',state.isAdrenalineActive&&!state.isAdrenalinePaused&&!state.isAwaitingSave);$('cycleStart').innerHTML=withIcon('start',startText());$('adrStart').innerHTML=withIcon('start',adrStartText());$('cyclePause').innerHTML=withIcon('pause','Pause');$('adrPause').innerHTML=withIcon('pause','Pause');$('cycleStart').disabled=!canStartCycle();$('cyclePause').disabled=!(state.isRunning&&!state.isCyclePaused&&!state.isAwaitingSave&&!cp);$('adrStart').disabled=!canStartAdr();$('adrPause').disabled=!(state.sessionId&&state.isAdrenalineActive&&!state.isAdrenalinePaused&&!state.isAwaitingSave);document.querySelectorAll('[data-action]').forEach(b=>{let a=b.dataset.action;if(['SHOCK','AMIODARONE','DSED','ROSC'].includes(a))b.disabled=!session||state.isAwaitingSave;if(a==='STOP')b.disabled=!session});let confirm=state.adrenalinePrompt?.type==='ADRENALINE_CONFIRM';$('adrBanner').classList.toggle('show',confirm);if(confirm){$('adrPromptSeconds').textContent=state.adrenalinePrompt.secondsRemaining+'s';$('adrAttempt').textContent=state.adrenalinePrompt.attempt<=1?'First prompt':'Second prompt'}renderLatest();renderEvents();save(settingsKey,settings)}
function renderLatest(){let types=['ADRENALINE_ADMINISTERED','CYCLE_COMPLETED','AMIODARONE_ADMINISTERED','SHOCK_DELIVERED','DSED_DELIVERED','ROSC'];let items=types.map(t=>state.recentEvents.find(e=>e.type===t)).filter(Boolean).sort((a,b)=>b.wallTimeMillis-a.wallTimeMillis);let html=items.map(e=>`<span class="chip" style="--c:${eventColor(e.type)}">${labelShort(e)}<span>${clock(e.wallTimeMillis)}</span></span>`).join('');$('latest').innerHTML=html;$('landLatest').innerHTML=html||`<span style="font-size:11px;color:var(--muted);font-weight:900">${statusText()}</span>`;$('latest').classList.toggle('show',!!items.length);$('cycleLast').textContent=lastDetail('Last rhythm check','INTERRUPTION_STARTED');$('adrLast').textContent=lastDetail('Last adrenaline','ADRENALINE_ADMINISTERED')}
function labelShort(e){return e.type==='ADRENALINE_ADMINISTERED'?'Adrenaline':e.type==='CYCLE_COMPLETED'?'Cycle':e.type==='AMIODARONE_ADMINISTERED'?'Amiodarone':e.type==='SHOCK_DELIVERED'?'Shock':e.type==='DSED_DELIVERED'?'DSED':'ROSC'}
function lastDetail(prefix,type){let e=state.recentEvents.find(x=>x.type===type);return e?`${prefix} ${clock(e.wallTimeMillis)}`:''}
function renderEvents(){let ev=state.recentEvents.filter(e=>!['INTERRUPTION_STARTED','INTERRUPTION_ENDED'].includes(e.type));$('recent').innerHTML=ev.length?ev.map(e=>`<div class="event"><time>${clock(e.wallTimeMillis)}</time><b>${e.label.replace(/\bno\.\s*(\d+)/i,'#$1')}</b>${e.note?`<small>${e.note}</small>`:''}</div>`).join(''):`<div class="event"><time></time><b>No CPR events yet</b></div>`}
function calculateWaafles(age,ageGroup,scope){let weight=ageGroup==='Months'?age*.5+4:(age<=5?age*2+8:age*3+7),adr=weight*.01,ml=weight/10,amio=weight*5,min=weight*10,max=weight*20,dex=Math.min(weight*2.5,50),sbp=ageGroup==='Months'?Math.floor(age/12)*2+70:age*2+70;let sga=ageGroup==='Months'?(weight<=5?'Size 1':'Size 1.5'):(age<=5&&weight>=10&&weight<=24?'Size 2':weight>=25&&weight<=35?'Size 2.5':age>5&&weight>35?'Consider adult SGA sizes':'');let ett=(ageGroup==='Months'?age/12:age)<8?'Not used below 8 years':`Uncuffed ${num(Math.round(((ageGroup==='Months'?age/12:age)/4+4)*2)/2)}\nCuffed ${num(Math.round(((ageGroup==='Months'?age/12:age)/4+3.5)*2)/2)}`;let energy=scope==='AP'?`${num(Math.min(weight*4,360))} J`:[4,6,8,10].map(m=>`${num(Math.min(weight*m,360))} J`).join(' -> ');let needle=ageGroup==='Months'||age<2?'IV Catheter 22g\n(Color:Blue | Length:2.5cm)':age<=6?'IV Catheter 18g\n(Color:Green | Length:3.2cm)':age<=13?'IV Catheter 16g\n(Color:Grey | Length:4.5cm)':'IV Catheter 16g\n(Color:Grey | Length:4.5cm)\nConsider patient size\nLonger needle maybe required\nARS Needle 10g or 14g';return{Age:`${age} ${ageGroup.toLowerCase()}`,Weight:`${num(weight)}kg`,Adrenaline:`${num(adr)}mg (${num(ml)}ml)`,Amiodarone:`${num(amio)}mg (${num(ml)}ml)`,Fluids:`${num(min)}-${num(max)} ml`,SGA:sga,ETT:ett,Energy:energy,SBP:`${sbp} mmHg`,Dextrose:`${num(dex)}ml`,Needle:needle}}
function num(v){return Number(v).toFixed(3).replace(/0+$/,'').replace(/\.$/,'')||'0'}
function renderWa(){let age=+$('waAge').value;if(!Number.isInteger(age)||age<=0)return waErr('Enter a valid age.');if(wa.ageGroup==='Months'&&age>12)return waErr('Choose Years for ages above 12 months.');if(wa.ageGroup==='Years'&&age>14)return waErr('Age exceeds pediatric range. Refer to the CPG.');$('waError').style.display='none';let r=calculateWaafles(age,wa.ageGroup,wa.scope);let fields=[['Weight',r.Weight],['Adrenaline',r.Adrenaline],['Amiodarone',r.Amiodarone],['Energy',r.Energy],['Fluids',r.Fluids],['SGA',r.SGA]];$('waResults').innerHTML=`<div class="wa-title">${wa.scope} WAAFELSS</div>`+fields.map(([k,v])=>`<div class="wcell"><small>${k}</small><b>${v||'-'}</b></div>`).join('')}
function waErr(t){$('waError').textContent=t;$('waError').style.display='block';$('waResults').innerHTML=''}
function initButtonIcons(){document.querySelectorAll('[data-icon]').forEach(btn=>{btn.innerHTML=withIcon(btn.dataset.icon,btn.textContent.trim())})}
function syncWaaflesPlacement(){
  let landscape=matchMedia('(orientation: landscape) and (min-width: 700px)').matches;
  let open=$('waPanel').classList.contains('show')&&settings.useWaafles;
  let expanded=landscape&&open;
  let target=expanded?$('waLandscapeHost'):$('waSection');
  if($('waPanel').parentElement!==target)target.appendChild($('waPanel'));
  $('landBottom').classList.toggle('wa-expanded',expanded);
}
function renderMainIntro(){
  const card=CprIntroCards[mainIntroIndex];
  $('mainIntroCount').textContent=`${mainIntroIndex+1} of ${CprIntroCards.length}`;
  $('mainIntroTitle').textContent=card.title;
  $('mainIntroMessage').textContent=card.message;
  $('mainIntroIcon').innerHTML=cprIntroIconSvg(card.icon);
  $('mainIntroDots').textContent=CprIntroCards.map((_,index)=>index===mainIntroIndex?'●':'○').join(' ');
  $('mainIntroBack').hidden=mainIntroIndex===0;
  $('mainIntroBack').parentElement.classList.toggle('first-page',mainIntroIndex===0);
  $('mainIntroNext').textContent=mainIntroIndex===CprIntroCards.length-1?'Done':'Next';
}
function openMainIntro(){mainIntroIndex=0;renderMainIntro();$('mainIntroModal').hidden=false}

function closeSubpage(){settings=load(settingsKey,defaults);$('subpageHost').classList.remove('show');$('subpageHost').setAttribute('aria-hidden','true');$('subpageFrame').src='about:blank';if(state.isRunning)startBeat();render()}

$('cycleStart').onclick=()=>action('START');$('cyclePause').onclick=()=>action('PAUSE');$('adrStart').onclick=()=>action('ADRENALINE');$('adrPause').onclick=()=>action('ADRENALINE_PAUSE');$('muteBtn').onclick=()=>{if(!session)return;state.isMetronomeMuted=!state.isMetronomeMuted;state.isMetronomeMuted?stopBeat():state.isRunning&&startBeat();render()};$('resumeAudioBtn').onclick=async()=>{try{stopBeat();resetSpokenPlayback();await unlockAudio({recreate:true});beep(880,80,.08);hideResumeAlert();if(state.isRunning){await wake();startBeat()}primeAudio();setTimeout(playNextCue,150);showFeedback('CPR audio reactivated')}catch(error){console.error('CPR resume audio unlock failed',error);showFeedback('Tap Continue again if audio is still muted')}};$('resumeDismissBtn').onclick=hideResumeAlert;$('settingsBtn').onclick=()=>openSubpage('settings.html?ver=asset-20260612-gate-test-cpr-4');$('historyBtn').onclick=()=>openSubpage('history.html?ver=asset-20260612-gate-test-cpr-4');$('homeBtn').onclick=()=>{if(session)showFeedback('CPR is active. Stop & Save before leaving.');else history.back()};$('waToggle').onclick=()=>{const open=$('waPanel').classList.toggle('show');$('waSection').classList.toggle('wa-open',open);syncWaaflesPlacement()};$('waCalc').onclick=renderWa;$('toggleRecent').onclick=()=>{$('recentCard').classList.toggle('recent-collapsed')};document.querySelectorAll('[data-wa-scope]').forEach(b=>b.onclick=()=>{wa.scope=b.dataset.waScope;document.querySelectorAll('[data-wa-scope]').forEach(x=>x.classList.toggle('on',x.dataset.waScope===wa.scope))});document.querySelectorAll('[data-wa-age]').forEach(b=>b.onclick=()=>{wa.ageGroup=b.dataset.waAge;$('waSuffix').textContent=wa.ageGroup.toLowerCase();document.querySelectorAll('[data-wa-age]').forEach(x=>x.classList.toggle('on',x.dataset.waAge===wa.ageGroup))});['pointerdown','touchstart','keydown','click'].forEach(ev=>window.addEventListener(ev,primeAudio,{once:true,passive:true}));document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden')markPageHidden();if(document.visibilityState==='visible')reconcilePageReturn()});window.addEventListener('pagehide',markPageHidden);window.addEventListener('pageshow',reconcilePageReturn);window.addEventListener('focus',reconcilePageReturn);matchMedia('(orientation: landscape) and (min-width: 700px)').addEventListener('change',syncWaaflesPlacement);window.addEventListener('message',event=>{if(event.source!==$('subpageFrame').contentWindow)return;let type=event.data?.type;if(type==='cpr-close-subpage')closeSubpage();if(type==='cpr-settings-changed'){settings=load(settingsKey,defaults);if(!settings.playAudioCues)stopSpokenCues();else primeAudio();if(state.isRunning&&!resumeAlertVisible)startBeat();persist();render()}if(type==='cpr-stop-active'){action('STOP');closeSubpage()}});window.addEventListener('beforeunload',e=>{if(session){e.preventDefault();e.returnValue=''}});
$('mainIntroSkip').onclick=closeMainIntro;$('mainIntroBack').onclick=()=>{if(mainIntroIndex>0){mainIntroIndex--;renderMainIntro()}};$('mainIntroNext').onclick=()=>{if(mainIntroIndex===CprIntroCards.length-1)closeMainIntro();else{mainIntroIndex++;renderMainIntro()}};

})();
